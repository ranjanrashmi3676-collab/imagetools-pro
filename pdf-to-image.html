<head>

<title>ImageTools Pro</title>

<meta name="description" content="Free Online Image Tools">
<meta name="keywords" content="Image Resizer, Image Compressor, Image Converter, Crop Image, Image to PDF">
<meta name="author" content="ImageTools Pro">

</head>
</head>

<body>

<div class="container">

<h1>📄 PDF to Image</h1>

<input type="file" id="pdfFile" accept="application/pdf">

<button onclick="convertPDF()">
Convert PDF
</button>

<div id="output"></div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc=
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

async function convertPDF(){

const file=document.getElementById("pdfFile").files[0];

if(!file){
alert("Select a PDF");
return;
}

const buffer=await file.arrayBuffer();

const pdf=await pdfjsLib.getDocument(buffer).promise;

output.innerHTML="";

for(let pageNum=1;pageNum<=pdf.numPages;pageNum++){

const page=await pdf.getPage(pageNum);

const viewport=page.getViewport({scale:2});

const canvas=document.createElement("canvas");

const ctx=canvas.getContext("2d");

canvas.width=viewport.width;
canvas.height=viewport.height;

await page.render({
canvasContext:ctx,
viewport:viewport
}).promise;

const img=document.createElement("img");
img.src=canvas.toDataURL("image/png");

const link=document.createElement("a");
link.href=img.src;
link.download="page-"+pageNum+".png";

const btn=document.createElement("button");
btn.innerHTML="Download Page "+pageNum;

link.appendChild(btn);

output.appendChild(img);
output.appendChild(link);

}

}

</script>

</body>
